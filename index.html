<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>HapkiCoach</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- BANNER -->
  <div class="banner">
    <div class="container">
      <h1>HapkiCoach</h1>
      <h2>L'appli de coaching Hapkido pour tous les niveaux</h2>
      <a href="https://www.hapkimudo.fr//" class="btn-yellow" target="_blank">Découvrir l'appli</a>
    </div>
  </div>

  <!-- CONTENU PRINCIPAL -->
  <div class="container">

    <h2>Arthur Tisserand</h2>
    <p class="subtitle">Fondateur & coach certifié Hapkido</p>
    <img class="avatar" src="images/profile.jpeg" alt="Arthur Tisserand">

    <h2>Nos services</h2>
    <div class="cards">

      <div class="card">
        <img src="images/card1.JPG" alt="Cours en ligne">
        <h3>Cours en ligne</h3>
      </div>

      <div class="card">
        <img src="images/card6.JPG" alt="Coaching perso">
        <h3>Coaching perso</h3>
      </div>

      <div class="card">
        <img src="images/card3.JPG" alt="Suivi de progression">
        <h3>Suivi de progression</h3>
      </div>

      <div class="card">
        <img src="images/card4.JPG" alt="Communauté">
        <h3>Communauté</h3>
      </div>

    </div>
  </div>

</body>
</html>
